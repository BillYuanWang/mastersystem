name: MasterDance
options:
  bundleIdPrefix: com.masterdance
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  MasterDanceCore:
    path: ..
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    exactVersion: 2.46.0

settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES

targets:
  MasterDanceAdmin:
    type: application
    platform: macOS
    sources:
      - path: Shared
        excludes:
          - Resources
      - path: Shared/Resources
        buildPhase: resources
      - path: MasterDanceAdmin
    dependencies:
      - package: MasterDanceCore
        product: MasterDanceCore
      - package: Supabase
        product: Supabase
    info:
      path: MasterDanceAdmin/Info.plist
      properties:
        CFBundleDisplayName: MD Desk
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: 0.1.20
        CFBundleVersion: 63
        CFBundleURLTypes:
          - CFBundleURLName: com.masterdance.desk.auth
            CFBundleURLSchemes:
              - masterdance-desk
        LSApplicationCategoryType: public.app-category.education
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masterdance.desk
        PRODUCT_NAME: MD Desk
        INFOPLIST_KEY_CFBundleDisplayName: MD Desk
        INFOPLIST_KEY_CFBundleIconFile: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

  MasterDanceMobile:
    type: application
    platform: iOS
    sources:
      - path: Shared
        excludes:
          - Resources
      - path: Shared/Resources
        buildPhase: resources
      - path: MasterDanceMobile
    dependencies:
      - package: MasterDanceCore
        product: MasterDanceCore
      - package: Supabase
        product: Supabase
    info:
      path: MasterDanceMobile/Info.plist
      properties:
        CFBundleDisplayName: Master Dance
        CFBundleShortVersionString: 0.1.20
        CFBundleVersion: "40"
        CFBundleURLTypes:
          - CFBundleURLName: com.masterdance.mobile.auth
            CFBundleURLSchemes:
              - masterdance
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.masterdance.mobile
        PRODUCT_NAME: Master Dance
        INFOPLIST_KEY_CFBundleDisplayName: Master Dance
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic

schemes:
  MasterDanceAdmin:
    build:
      targets:
        MasterDanceAdmin: all
    run:
      config: Debug
  MasterDanceMobile:
    build:
      targets:
        MasterDanceMobile: all
    run:
      config: Debug
